  <script type="text/javascript">
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(() => {
        console.log('Service Worker Registered');
      });
    }

    (function() {
      const OriginalRequest = window.Request;
      window.Request = function(input, options) {
        let url = (typeof input === 'string') ? input : input.url;
        if (url && (url.includes('Build.data') || url.includes('Build.wasm'))) {
          const cleanUrl = url.split('?')[0];
          return new OriginalRequest(cleanUrl, options);
        }
        return new OriginalRequest(input, options);
      };
      window.Request.prototype = OriginalRequest.prototype;

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        if (url && url.includes('Build.data') || url.includes('Build.wasm')) {
          arguments[1] = url.split('?')[0];
        }
        return originalOpen.apply(this, arguments);
      };
    })();
  </script>

<body style="background-color: #0b0f12; color: #fff;">

  <script type="text/javascript">
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const ver = "20260219";
    const currentLang = localStorage.getItem('lang') || 'en';
    const tMap = {
      en: { download: "DOWNLOAD ZIP", packing: "PACKING...", back: "← Back to Gallery" },
      zh: { download: "下载 ZIP", packing: "打包中...", back: "← 返回歌曲列表" }
    };
    const _t = (k) => tMap[currentLang][k];

    document.getElementById('backLink').textContent = _t('back');
    const dBtn = document.getElementById('downloadBtn');
    dBtn.textContent = _t('download');

    let unityInstance = null;
    let songData = null;

    async function initFavButton() {
      const favBtn = document.getElementById('fav-btn-player');
      try {
        const res = await fetch('/api/auth/status');
        const status = await res.json();
        if (!status.user) return;
        const favRes = await fetch('/api/user/favorites');
        const favs = await favRes.json();
        if (favs.some(f => String(f.id) === String(id))) favBtn.classList.add('active');
        favBtn.onclick = async () => {
          const r = await fetch('/api/user/favorite/toggle', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ songId: id, title: songData.title, artist: songData.artist })
          });
          const d = await r.json(); favBtn.classList.toggle('active', d.favorited);
        };
      } catch(e) {}
    }

    function sendToUnity(idx) {
      if(!unityInstance) return;
      const root = window.location.origin + '/api3/api';
      const mv = localStorage.getItem('videoEnabled') !== 'false' ? `${root}/maichart/${encodeURIComponent(id)}/video` : '';
      const payload = [`${root}/maichart/${encodeURIComponent(id)}/chart`,`${root}/maichart/${encodeURIComponent(id)}/track`,`${root}/maichart/${encodeURIComponent(id)}/image?fullImage=true`,mv,`lv${idx}`].join('\n');
      unityInstance.SendMessage("HandleJSMessages", "ReceiveMessage", payload);
      if (document.getElementById("song-designer")) {
          document.getElementById("song-designer").textContent = (songData && songData.designers) ? (songData.designers[idx + 1] || "Unknown") : "-";
      }
    }

    const config = {
      dataUrl: `/WebGLBuild/Build.data?v=${ver}`,
      frameworkUrl: `/WebGLBuild/Build.framework.js?v=${ver}`,
      codeUrl: `/WebGLBuild/Build.wasm?v=${ver}`,
      streamingAssetsUrl: `/WebGLBuild/StreamingAssets?v=${ver}`,
      companyName: "Majdata", 
      productName: "MaiViewer", 
      productVersion: ver,
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2)
    };

    if (id) {
      createUnityInstance(document.getElementById("unity-canvas"), config, (p) => {
        const pct = Math.round(p * 100);
        const bar = document.getElementById("progress-bar");
        const txt = document.getElementById("progress-text");
        if (bar) bar.style.width = pct + "%";
        if (txt) txt.textContent = pct + "%";
      }).then(async (inst) => {
        unityInstance = inst;
        const overlay = document.getElementById("loading-overlay");
        if (overlay) overlay.style.display = "none";
        
        const res = await fetch(`/api3/api/maichart/${encodeURIComponent(id)}/summary`);
        songData = await res.json();
        document.getElementById("song-title").textContent = songData.title;
        document.getElementById("song-artist").textContent = songData.artist;
        document.getElementById("song-bpm").textContent = songData.bpm || "-";
        document.title = `${songData.title} | MaiViewer`;
        const lvDiv = document.getElementById("levels");
        lvDiv.innerHTML = (songData.levels || []).map((lv, i) => lv ? `<button class="btn-lv lv-${i}" data-idx="${i}">${lv}</button>` : '').join('');
        const lastIdx = songData.levels.findLastIndex(v => v && v.trim() !== "");
        setTimeout(() => sendToUnity(lastIdx >= 0 ? lastIdx : 3), 200);
        lvDiv.onclick = (e) => { const btn = e.target.closest('.btn-lv'); if(btn) sendToUnity(parseInt(btn.dataset.idx)); };
        initFavButton();
      }).catch(err => {
        console.error("Unity Load Error:", err);
      });
    }

    dBtn.onclick = async () => {
      dBtn.textContent = _t('packing'); dBtn.disabled = true;
      try {
        const zip = new JSZip(); const base = `/api3/api/maichart/${encodeURIComponent(id)}`;
        // 文件名映射逻辑
        const files = [
          { key: 'maidata.txt', url: `${base}/chart` },
          { key: 'track', url: `${base}/track` },
          { key: 'bg', url: `${base}/image` },
          { key: 'pv.mp4', url: `${base}/video` }
        ];

        for(const f of files){
          const r = await fetch(f.url); if(!r.ok) continue;
          const b = await r.blob(); 
          let finalName = f.key;

          if (f.key === 'bg') {
            finalName = b.type.includes('png') ? 'bg.png' : 'bg.jpg';
          } else if (f.key === 'track') {
            finalName = b.type.includes('ogg') ? 'track.ogg' : 'track.mp3';
          }

          zip.file(finalName, b);
        }
        const blob = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${songData.title}.zip`; a.click();
      } catch(e){}
      dBtn.textContent = _t('download'); dBtn.disabled = false;
    };
  </script>
